<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruption Desk - Airline Policy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-sky-500 selection:text-white text-xs">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>

    <div x-data="{
        searchQuery: '',
        selectedAirline: null,
        isAdminMode: false,
        adminPasswordInput: '',
        isEditing: false,
        viewMode: 'agent', 
        airlines: [],

        zuluInput: '12:00',
        get estOutput() {
            if(!this.zuluInput) return '--:-- --';
            try {
                let cleanTime = this.zuluInput.trim().replace(' ', '');
                let parts = cleanTime.split(':');
                if(parts.length !== 2) return '--:-- --';
                let hours = parseInt(parts[0], 10);
                let minutes = parseInt(parts[1], 10);
                if(hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return '--:-- --';
                let estHours = hours - 5;
                if (estHours < 0) estHours += 24;
                const ampm = estHours >= 12 ? 'PM' : 'AM';
                estHours = estHours % 12;
                if (estHours === 0) estHours = 12; 
                return String(estHours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0') + ' ' + ampm;
            } catch(e) { return '--:-- --'; }
        },

        // 14 MANDATORY CORE FIELDS DATA SPECS SHELL
        formAirline: {
            airlineName: '', iata: '', logo: '✈️',
            reissueQualifications: '',
            orderOfSelectingAirlines: '',
            rebookingExceptions: '',
            reissueGuidelines: '',
            travelWindow: '',
            classes: '',
            originDestination: '',
            reissueWaiver: '',
            refundGuidelines: '',
            refundsPermittedScenarios: '',
            refundsNotPermittedScenarios: '',
            forPartiallyUsedTickets: '',
            refundWaiver: '',
            policyLink: ''
        },

        generateEmptyStructure() {
            return {
                airlineName: '', iata: '', logo: '✈️',
                reissueQualifications: 'N/A', orderOfSelectingAirlines: 'N/A', rebookingExceptions: 'N/A',
                reissueGuidelines: 'N/A', travelWindow: 'N/A', classes: 'N/A', originDestination: 'N/A',
                reissueWaiver: 'N/A', refundGuidelines: 'N/A', refundsPermittedScenarios: 'N/A',
                refundsNotPermittedScenarios: 'N/A', forPartiallyUsedTickets: 'N/A', refundWaiver: 'N/A',
                policyLink: ''
            };
        },

        // 🤖 MULTI-COMPANIES AI INTELLIGENT CAPTURE SCANNER
        async handlePdfAutoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let extractedText = '';

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    extractedText += textContent.items.map(item => item.str).join(' ') + '\n';
                }

                this.extractFourteenFields(extractedText);
                alert('AI Mapping Done! All 14 fields targeted and filled from document.');
            } catch (error) {
                console.error(error);
                alert('Error scanning text parameters.');
            }
        },

        // Deep Text Extraction Engine matching your exact fields
        extractFourteenFields(text) {
            const cleanText = text.replace(/\s+/g, ' ');
            const lowerText = cleanText.toLowerCase();

            // Auto Identification Core
            if (lowerText.includes('air canada') || lowerText.includes(' ac ')) {
                this.formAirline.airlineName = 'Air Canada'; this.formAirline.iata = 'AC'; this.formAirline.logo = '🇨🇦';
            } else if (lowerText.includes('turkish airlines') || lowerText.includes('tk segment')) {
                this.formAirline.airlineName = 'Turkish Airlines'; this.formAirline.iata = 'TK'; this.formAirline.logo = '🇹🇷';
            } else {
                const titleMatch = text.match(/([A-Z][A-Za-z\s]+)(?:Policy|Schedule Change)/);
                this.formAirline.airlineName = titleMatch ? titleMatch[1].trim() : 'New Carrier';
                this.formAirline.iata = this.formAirline.airlineName.substring(0,2).toUpperCase();
            }

            // Helper text capture function using heading windows
            const getSection = (startText, endText, maxLen = 400) => {
                let startIdx = lowerText.indexOf(startText.toLowerCase());
                if (startIdx === -1) return 'N/A';
                startIdx += startText.length;
                let endIdx = endText ? lowerText.indexOf(endText.toLowerCase(), startIdx) : -1;
                if (endIdx === -1 || (endIdx - startIdx) > maxLen) endIdx = startIdx + maxLen;
                return cleanText.substring(startIdx, endIdx).trim();
            };

            // Parse text arrays directly to fields
            this.formAirline.reissueQualifications = getSection('reissue qualifications', 'order of selecting');
            this.formAirline.orderOfSelectingAirlines = getSection('order of selecting airlines for rebooking:', 'rebooking exceptions');
            this.formAirline.rebookingExceptions = getSection('rebooking exceptions for select airlines/destinations:', 'reissue guidelines');
            this.formAirline.reissueGuidelines = getSection('reissue guidelines', 'travel window');
            this.formAirline.travelWindow = getSection('travel window', 'classes');
            this.formAirline.classes = getSection('classes', 'origin/destination');
            this.formAirline.originDestination = getSection('origin/destination', 'reissue waiver');
            this.formAirline.reissueWaiver = getSection('reissue waiver', 'refund guidelines');
            this.formAirline.refundGuidelines = getSection('refund guidelines', 'refunds are permitted');
            this.formAirline.refundsPermittedScenarios = getSection('refunds are permitted in the following scenarios:', 'refunds are not permitted');
            this.formAirline.refundsNotPermittedScenarios = getSection('refunds are not permitted in the following scenarios:', 'for partially used tickets:');
            this.formAirline.forPartiallyUsedTickets = getSection('for partially used tickets:', 'refund waiver');
            this.formAirline.refundWaiver = getSection('refund waiver', 'policy link');
            
            // Link Picker
            const linkMatch = cleanText.match(/https?:\/\/[^\s]+/i);
            this.formAirline.policyLink = linkMatch ? linkMatch[0] : '';
        },

        verifyAdmin() {
            if(this.adminPasswordInput.trim().toLowerCase() === 'admin123') { this.isAdminMode = true; this.adminPasswordInput = ''; } else { alert('Access Denied'); }
        },

        saveAirline() {
            if(!this.formAirline.airlineName) return alert('Airline Name required.');
            let freshObj = JSON.parse(JSON.stringify(this.formAirline));
            const idx = this.airlines.findIndex(a => a.iata === freshObj.iata);
            if(idx !== -1) { this.airlines[idx] = freshObj; } else { this.airlines.push(freshObj); }
            localStorage.setItem('disruption_desk_fleet_data', JSON.stringify(this.airlines));
            this.selectedAirline = freshObj;
            this.isEditing = false; this.isAdminMode = false; this.resetForm();
        },

        prepareNewAirlineForm() { this.formAirline = this.generateEmptyStructure(); this.isEditing = false; this.isAdminMode = true; },
        editAirline(airline) { this.formAirline = JSON.parse(JSON.stringify(airline)); this.isEditing = true; this.isAdminMode = true; },
        resetForm() { this.formAirline = this.generateEmptyStructure(); this.isEditing = false; },
        init() {
            const data = localStorage.getItem('disruption_desk_fleet_data');
            if (data) { try { this.airlines = JSON.parse(data); this.selectedAirline = this.airlines[0]; return; } catch(e) {} }
            this.loadDefaults();
        },
        loadDefaults() { this.airlines = []; }
    }" class="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased text-xs" x-init="init()">

        <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3"><span class="text-2xl">🌐</span><h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">DISRUPTION DESK</h1></div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 text-xs px-2 py-1 rounded text-white w-20" />
                    <button @click="verifyAdmin()" class="bg-slate-800 text-white font-bold text-[10px] px-2 py-1 rounded ml-1">Auth</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-gradient-to-br from-slate-900 to-indigo-950/40 border border-slate-800 p-5 rounded-xl shadow-xl">
                    <label class="block text-slate-400 mb-1 font-bold uppercase tracking-wider">Zulu Clock</label>
                    <input type="text" x-model="zuluInput" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white font-mono text-center text-sm" />
                    <div class="text-center text-sky-400 font-bold font-mono mt-1" x-text="'EST: ' + estOutput"></div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-bold text-slate-400 uppercase">Airlines Index (<span x-text="airlines.length"></span>)</span>
                        <button x-show="isAdminMode" @click="prepareNewAirlineForm()" class="bg-emerald-600 text-slate-950 font-bold px-2 py-0.5 rounded text-[10px]">New +</button>
                    </div>
                    <input type="text" placeholder="Search..." x-model="searchQuery" class="w-full px-3 py-1.5 bg-slate-950 border border-slate-700 rounded mb-2 text-white" />
                    <div class="space-y-1 max-h-[250px] overflow-y-auto">
                        <template x-for="airline in airlines.filter(a => !searchQuery || a.airlineName.toLowerCase().includes(searchQuery.toLowerCase()))" :key="airline.iata">
                            <div class="flex items-center space-x-1">
                                <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 border border-slate-800/60'" class="flex-1 text-left p-3 rounded-lg flex justify-between items-center">
                                    <div class="flex items-center space-x-3"><span x-text="airline.logo"></span><span class="font-semibold" x-text="airline.airlineName"></span></div>
                                    <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                                </button>
                                <template x-if="isAdminMode"><button @click="editAirline(airline)" class="p-2 bg-slate-900 border border-slate-800 rounded text-amber-400">✏️</button></template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">

                <div x-show="isAdminMode" class="bg-[#0b1329] border border-slate-800 rounded-xl p-6 space-y-6 shadow-2xl">
                    <div class="border-2 border-dashed border-sky-800/80 bg-sky-950/20 rounded-xl p-6 text-center relative">
                        <input type="file" accept=".pdf" @change="handlePdfAutoUpload($event)" class="absolute inset-0 opacity-0 cursor-pointer z-10" />
                        <span class="text-2xl block">🤖 14-Field Smart AI Guidelines Scanner</span>
                        <p class="text-xs text-slate-200 mt-1">Drop any PDF policy file here to automatically read and populate all fields</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-slate-400 mb-1 font-bold">Airline Name</label><input type="text" x-model="formAirline.airlineName" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-slate-400 mb-1 font-bold">IATA Code</label><input type="text" x-model="formAirline.iata" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                    </div>

                    <div class="space-y-4 pt-2">
                        <div><label class="block text-sky-400 mb-1 font-bold">Reissue Qualifications</label><textarea x-model="formAirline.reissueQualifications" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-sky-400 mb-1 font-bold">Order of Selecting Airlines for Rebooking</label><textarea x-model="formAirline.orderOfSelectingAirlines" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-sky-400 mb-1 font-bold">Rebooking Exceptions for Select Airlines/Destinations</label><textarea x-model="formAirline.rebookingExceptions" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-sky-400 mb-1 font-bold">Reissue Guidelines</label><textarea x-model="formAirline.reissueGuidelines" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-sky-400 mb-1 font-bold">Travel Window</label><textarea x-model="formAirline.travelWindow" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-sky-400 mb-1 font-bold">Classes</label><textarea x-model="formAirline.classes" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-sky-400 mb-1 font-bold">Origin/Destination</label><textarea x-model="formAirline.originDestination" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-sky-400 mb-1 font-bold">Reissue Waiver</label><textarea x-model="formAirline.reissueWaiver" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-emerald-400 mb-1 font-bold">Refund Guidelines</label><textarea x-model="formAirline.refundGuidelines" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-emerald-400 mb-1 font-bold">Refunds are Permitted in the Following Scenarios</label><textarea x-model="formAirline.refundsPermittedScenarios" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-emerald-400 mb-1 font-bold">Refunds are Not Permitted in the Following Scenarios</label><textarea x-model="formAirline.refundsNotPermittedScenarios" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-emerald-400 mb-1 font-bold">For Partially Used Tickets</label><textarea x-model="formAirline.forPartiallyUsedTickets" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-emerald-400 mb-1 font-bold">Refund Waiver</label><textarea x-model="formAirline.refundWaiver" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded h-16 text-white"></textarea></div>
                        <div><label class="block text-slate-400 mb-1 font-bold">Policy Link</label><input type="url" x-model="formAirline.policyLink" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                    </div>
                    <button @click="saveAirline()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold uppercase rounded-lg shadow-lg">Commit & Save Complete Airline Profile Object</button>
                </div>

                <div>
                    <template x-if="selectedAirline">
                        <div class="space-y-6 animate-fadeIn">
                            
                            <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 flex justify-between items-center shadow-xl">
                                <div class="flex items-center space-x-4">
                                    <span class="text-3xl" x-text="selectedAirline.logo"></span>
                                    <div>
                                        <h2 class="text-lg font-bold text-white" x-text="selectedAirline.airlineName"></h2>
                                        <span class="font-mono text-slate-400" x-text="'IATA: ' + selectedAirline.iata"></span>
                                    </div>
                                </div>
                                <template x-if="selectedAirline.policyLink">
                                    <a :href="selectedAirline.policyLink" target="_blank" class="bg-slate-950 border border-slate-700 hover:border-sky-500 px-4 py-2.5 rounded-lg font-bold text-sky-400 transition">🔗 Open Reference Source Policy</a>
                                </template>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                
                                <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 space-y-4 shadow-xl">
                                    <h3 class="text-sm font-bold text-sky-400 border-b border-slate-800 pb-2 uppercase tracking-wider">🔄 Reissue & Rebooking Guidelines</h3>
                                    <div class="space-y-3">
                                        <div><span class="text-[10px] font-bold text-slate-400 uppercase block">Reissue Qualifications</span><p class="text-slate-200 mt-0.5 select-text font-medium" x-text="selectedAirline.reissueQualifications"></p></div>
                                        <div><label class="block text-slate-400 font-bold text-[10px] uppercase">Order of Selecting Airlines for Rebooking</label><p class="text-slate-200 select-text font-medium" x-text="selectedAirline.orderOfSelectingAirlines"></p></div>
                                        <div><label class="block text-slate-400 font-bold text-[10px] uppercase">Rebooking Exceptions for Select Airlines/Destinations</label><p class="text-slate-200 select-text font-medium" x-text="selectedAirline.rebookingExceptions"></p></div>
                                        <div><label class="block text-slate-400 font-bold text-[10px]" uppercase>Reissue Guidelines</label><p class="text-slate-200 select-text font-medium" x-text="selectedAirline.reissueGuidelines"></p></div>
                                        <div><label class="block text-slate-400 font-bold text-[10px]" x-text="'Travel Window'"></label><p class="text-slate-200 select-text font-medium" x-text="selectedAirline.travelWindow"></p></div>
                                        <div><label class="block text-slate-400 font-bold text-[10px]" x-text="'Classes'"></label><p class="text-slate-200 select-text font-medium" x-text="selectedAirline.classes"></p></div>
                                        <div><label class="block text-slate-400 font-bold text-[10px]" x-text="'Origin/Destination'"></label><p class="text-slate-200 select-text font-medium" x-text="selectedAirline.originDestination"></p></div>
                                        <div><label class="block text-slate-400 font-bold text-[10px]" x-text="'Reissue Waiver'"></label><p class="text-slate-300 font-mono select-text font-bold text-sky-400 bg-sky-950/20 p-1 rounded inline-block" x-text="selectedAirline.reissueWaiver"></p></div>
                                    </div>
                                </div>

                                <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 space-y-4 shadow-xl">
                                    <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider">⚖️ Refund Matrix & Protocols</h3>
                                    <div class="space-y-4 text-xs">
                                        <div><label class="block text-slate-400 mb-0.5 font-bold text-[10px] uppercase">Refund Guidelines</label><p class="text-slate-200 select-text font-medium" x-text="selectedAirline.refundGuidelines"></p></div>
                                        <div><label class="block text-slate-400 mb-0.5 font-bold text-[10px] uppercase">Refunds are Permitted in the Following Scenarios</label><p class="text-slate-200 select-text font-medium text-emerald-400 bg-emerald-950/10 p-2 rounded border border-emerald-900/30 leading-relaxed" x-text="selectedAirline.refundsPermittedScenarios"></p></div>
                                        <div><label class="block text-slate-400 mb-0.5 font-bold text-[10px] uppercase">Refunds are Not Permitted in the Following Scenarios</label><p class="text-slate-200 select-text font-medium text-rose-400 bg-rose-950/10 p-2 rounded border border-rose-900/30 leading-relaxed" x-text="selectedAirline.refundsNotPermittedScenarios"></p></div>
                                        <div><label class="block text-slate-400 mb-0.5 font-bold text-[10px] uppercase">For Partially Used Tickets</label><p class="text-slate-200 select-text font-medium" x-text="selectedAirline.forPartiallyUsedTickets"></p></div>
                                        <div><label class="block text-slate-400 mb-0.5 font-bold text-[10px] uppercase">Refund Waiver</label><p class="text-emerald-400 font-mono select-text font-bold bg-emerald-950/20 p-1 rounded inline-block" x-text="selectedAirline.refundWaiver"></p></div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
