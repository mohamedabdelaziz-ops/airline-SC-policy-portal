<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruption Desk - Airline Policy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-sky-500 selection:text-white text-xs">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>

    <div x-data="{
        searchQuery: '',
        selectedAirline: null,
        isAdminMode: false,
        adminPasswordInput: '',
        isEditing: false,
        viewMode: 'agent', 
        currentLang: 'en',
        activePolicy: 'pure_skchg', 
        airlines: [],

        zuluInput: '12:00',
        get estOutput() {
            if(!this.zuluInput) return '--:-- --';
            try {
                let cleanTime = this.zuluInput.trim().replace(' ', '');
                let parts = cleanTime.split(':');
                if(parts.length !== 2) return '--:-- --';
                let hours = parseInt(parts[0], 10);
                let minutes = parseInt(parts[1], 10);
                if(hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return '--:-- --';
                let estHours = hours - 5;
                if (estHours < 0) estHours += 24;
                const ampm = estHours >= 12 ? 'PM' : 'AM';
                estHours = estHours % 12;
                if (estHours === 0) estHours = 12; 
                return String(estHours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0') + ' ' + ampm;
            } catch(e) { return '--:-- --'; }
        },

        newCustomLabel: '',
        newCustomValue: '',
        newCustomStatus: true,
        targetColumnType: 'skchg', 
        targetConditionType: 'normal', 

        formAirline: {
            airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-07-01',
            policyWebLink: '', policyPdfLink: '',
            threshold: '', travelWindow: '', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
            pureSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
            pureName: { fields: [] },
            oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
            oalName: { fields: [] }
        },

        // 🤖 ANY-AIRLINE DYNAMIC AI TEXT EXTRACTION & FIELD CREATION PIPELINE
        async handlePdfAutoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let extractedText = '';

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    extractedText += textContent.items.map(item => item.str).join(' ') + '\n';
                }

                this.parseAnyAirlineText(extractedText);
                alert('AI Dynamic Scan Complete! Created custom fields based on document contents.');
            } catch (error) {
                console.error(error);
                alert('Failed to parse text nodes from PDF.');
            }
        },

        // Parses any text and dynamically maps or invents custom database rows
        parseAnyAirlineText(text) {
            const lines = text.split('\n');
            const lowerText = text.toLowerCase();

            // Auto-wipe form arrays to avoid duplicate mixing
            this.formAirline.pureSkchg.normalSkchg = [];
            this.formAirline.pureSkchg.normalRefund = [];

            // Identify Name Natively
            const nameMatch = text.match(/([A-Za-z0-9\s]+)\s*(?:Schedule Change|Policy|Flights)/i);
            this.formAirline.airlineName = nameMatch ? nameMatch[1].trim() : 'New Extracted Airline';
            this.formAirline.iata = this.formAirline.airlineName.substring(0,2).toUpperCase();

            // Look for patterns like triggers or windows
            const timeMatch = text.match(/(\d+)\s*(?:hour|hours|minutes|mins|min)/i);
            this.formAirline.threshold = timeMatch ? timeMatch[0] : 'See Details';

            const windowMatch = text.match(/([-+]\d+\s*days|within\s*\d+\s*days)/i);
            this.formAirline.travelWindow = windowMatch ? windowMatch[0] : 'Check Ruleset';

            // DYNAMIC LOOP: Build field objects directly from raw paragraph blocks
            let paragraphs = text.split(/(?=[A-Z][A-Z\s]{4,}:)/); // Split on sections like 'REISSUE QUALIFICATIONS:'
            paragraphs.forEach(p => {
                let parts = p.split(':');
                if (parts.length > 1 && parts[0].trim().length < 40) {
                    let label = parts[0].trim().toUpperCase();
                    let val = parts.slice(1).join(':').trim();
                    if(val.length > 10) {
                        this.formAirline.pureSkchg.normalSkchg.push({
                            label: label,
                            value: val.replace(/\s+/g, ' '),
                            allowed: true
                        });
                    }
                }
            });

            // Fallback chunking if text has no clean colon delimiters
            if(this.formAirline.pureSkchg.normalSkchg.length === 0) {
                if(lowerText.includes('refund')) {
                    this.formAirline.pureSkchg.normalRefund.push({
                        label: 'EXTRACTED REFUND RULES',
                        value: text.substring(0, 400) + '...',
                        allowed: true
                    });
                }
            }
        },

        isInternalField(label) {
            if (!label) return false;
            const lowerLabel = label.toLowerCase();
            return lowerLabel.includes('gds') || lowerLabel.includes('command') || lowerLabel.includes('internal') || lowerLabel.includes('technical');
        },

        verifyAdmin() {
            if(this.adminPasswordInput.trim().toLowerCase() === 'admin123') { 
                this.isAdminMode = true; this.adminPasswordInput = ''; 
            } else { alert('Access Denied'); }
        },

        generateEmptyStructure() {
            return {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-07-01',
                policyWebLink: '', policyPdfLink: '',
                threshold: 'N/A', travelWindow: 'N/A', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                pureSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
                pureName: { fields: [] },
                oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] },
                oalName: { fields: [] }
            };
        },

        forceResetDatabase() {
            localStorage.removeItem('disruption_desk_fleet_data');
            this.loadDefaults();
            alert('Database reset!');
        },

        // 📋 LOAD BALANCED PRE-LOADED AIR CANADA SYSTEM SPEC DATA OBJECTS
        loadDefaults() {
            this.airlines = [
                {
                    airlineName: 'Air Canada', iata: 'AC', icao: 'ACA', logo: '🇨🇦', lastUpdated: '2025-03-14',
                    policyWebLink: 'https://www.aircanada.com/agency', policyPdfLink: '',
                    threshold: '3 Hours', travelWindow: '+/-3 Days North America / +/-7 Days Rest of World', 
                    oalRebookingVal: 'ALLOWED (STAR ALLIANCE RULES)', refundEligVal: 'YES',
                    pureSkchg: {
                        normalSkchg: [
                            { label: 'REISSUE QUALIFICATIONS', value: 'Action segment status changes within 14 days of notice or 48 hours prior to departure. Includes codes UN, NO, HX, WK, WL, WN, and TK.', allowed: true },
                            { label: 'CLASSES & RBD RULES', value: 'Economy Cabin: U to Y for Latitude, up to M for Basic, Standard, Flex, Comfort. Premium Economy: Up to O. Business/Signature: Up to J.', allowed: true },
                            { label: 'ORDER OF SELECTING AIRLINES FOR REBOOKING', value: '1. AC/Rouge/Express, 2. Atlantic Joint Venture (AC, UA, LHG), 3. AC Codeshare via Star Alliance, 4. Pure Star Alliance (lowest code in same cabin).', allowed: true },
                            { label: 'ORIGIN / DESTINATION METRICS', value: 'Same origin/destination. Connecting point changes allowed. Same global direction must be respected. Alternate AC stations within 200 miles permitted (e.g., MIA/FLL).', allowed: true },
                            { label: 'REBOOKING EXCEPTIONS', value: 'Cuba: US laws prohibit inclusion of any US carrier in PNR with other airlines. Australia/NZ: UA is prohibited, CX in G class prohibited. QF allowed in Economy E,O,Q,G,N,S,V,L and Business D.', allowed: true }
                        ],
                        iropSkchg: [],
                        normalRefund: [
                            { label: 'REFUNDS PERMITTED SCENARIOS', value: 'UN/TK schedule change of 3+ hours, full flight cancellation, change from non-stop to connecting, routing/airport change, misconnection, or same-day connection failure.', allowed: true },
                            { label: 'REFUNDS NOT PERMITTED SCENARIOS', value: 'Departure change less than 3 hours, cancellation with protection less than 3 hours deviation, aircraft change with cabin variance, change of operating carrier.', allowed: false },
                            { label: 'REFUND WAIVER CODES', value: 'Waiver Box: SKCHxxxx (Flight Number). Endorsement Box: SKCHxxxx. Accessibility: ACCESSxxxx. Cabin Change/Regrade: REGRADExxxx.', allowed: true }
                        ],
                        iropRefund: []
                    },
                    pureName: { fields: [] }, oalSkchg: { normalSkchg: [], iropSkchg: [], normalRefund: [], iropRefund: [] }, oalName: { fields: [] }
                }
            ];
            localStorage.setItem('disruption_desk_fleet_data', JSON.stringify(this.airlines));
            this.selectedAirline = this.airlines[0];
        },

        saveAirline() {
            if(!this.formAirline.airlineName) return alert('Airline Name required.');
            let freshBase = this.generateEmptyStructure();
            Object.assign(freshBase, this.formAirline);
            freshBase.iata = freshBase.iata.toUpperCase();
            
            freshBase.pureSkchg.normalSkchg = JSON.parse(JSON.stringify(this.formAirline.pureSkchg.normalSkchg));
            freshBase.pureSkchg.normalRefund = JSON.parse(JSON.stringify(this.formAirline.pureSkchg.normalRefund));

            const idx = this.airlines.findIndex(a => a.iata === freshBase.iata);
            if(idx !== -1) { this.airlines[idx] = freshBase; } else { this.airlines.push(freshBase); }
            
            localStorage.setItem('disruption_desk_fleet_data', JSON.stringify(this.airlines));
            this.selectedAirline = freshBase;
            this.isEditing = false; this.isAdminMode = false; this.resetForm();
        },

        prepareNewAirlineForm() { this.formAirline = this.generateEmptyStructure(); this.isEditing = false; this.isAdminMode = true; },
        editAirline(airline) { this.formAirline = JSON.parse(JSON.stringify(airline)); this.isEditing = true; this.isAdminMode = true; },
        resetForm() { this.formAirline = this.generateEmptyStructure(); this.isEditing = false; },
        init() {
            const data = localStorage.getItem('disruption_desk_fleet_data');
            if (data) { try { this.airlines = JSON.parse(data); this.selectedAirline = this.airlines[0]; return; } catch(e) {} }
            this.loadDefaults();
        }
    }" class="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased text-xs" x-init="init()">

        <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3"><span class="text-2xl">🌐</span><h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">DISRUPTION DESK</h1></div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center bg-slate-900 border border-slate-800 p-0.5 rounded-lg">
                    <button @click="viewMode = 'customer'" :class="viewMode === 'customer' ? 'bg-sky-600 text-white font-bold' : 'text-slate-400'" class="px-3 py-1 rounded text-[10px] uppercase">PASSENGER VIEW</button>
                    <button @click="viewMode = 'agent'" :class="viewMode === 'agent' ? 'bg-indigo-600 text-white font-bold' : 'text-slate-400'" class="px-3 py-1 rounded text-[10px] uppercase">AGENT VIEW</button>
                </div>
                <div class="flex items-center bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 text-xs px-2 py-1 rounded text-white w-20" />
                    <button @click="verifyAdmin()" class="bg-slate-800 text-white font-bold text-[10px] px-2 py-1 rounded ml-1">Auth</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-gradient-to-br from-slate-900 to-indigo-950/40 border border-slate-800 p-5 rounded-xl shadow-xl">
                    <label class="block text-slate-400 mb-2 font-bold uppercase tracking-wider">Zulu Clock</label>
                    <input type="text" x-model="zuluInput" placeholder="17:30" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white font-mono text-center text-sm" />
                    <div class="text-center text-sky-400 font-bold font-mono mt-1" x-text="'EST: ' + estOutput"></div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-bold text-slate-400 uppercase">Airlines Index (<span x-text="airlines.length"></span>)</span>
                        <button x-show="isAdminMode" @click="prepareNewAirlineForm()" class="bg-emerald-600 text-slate-950 font-bold px-2 py-0.5 rounded text-[10px]">New +</button>
                    </div>
                    <input type="text" placeholder="Search..." x-model="searchQuery" class="w-full px-3 py-1.5 bg-slate-950 border border-slate-700 rounded mb-2 text-white" />
                    <div class="space-y-1 max-h-[250px] overflow-y-auto">
                        <template x-for="airline in airlines.filter(a => !searchQuery || a.airlineName.toLowerCase().includes(searchQuery.toLowerCase()))" :key="airline.iata">
                            <div class="flex items-center space-x-1">
                                <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 border border-slate-800/60'" class="flex-1 text-left p-3 rounded-lg flex justify-between items-center">
                                    <div class="flex items-center space-x-3"><span x-text="airline.logo"></span><span class="font-semibold" x-text="airline.airlineName"></span></div>
                                    <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                                </button>
                                <template x-if="isAdminMode"><button @click="editAirline(airline)" class="p-2 bg-slate-900 border border-slate-800 rounded text-amber-400">✏️</button></template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-xl grid grid-cols-2 md:grid-cols-4 gap-1.5">
                    <button @click="activePolicy = 'pure_skchg'" :class="activePolicy === 'pure_skchg' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white font-bold' : 'text-slate-400'" class="py-2 rounded-lg font-semibold">🔄 Pure SC</button>
                    <button @click="activePolicy = 'pure_name'" :class="activePolicy === 'pure_name' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white font-bold' : 'text-slate-400'" class="py-2 rounded-lg font-semibold">📝 Pure Name</button>
                    <button @click="activePolicy = 'oal_skchg'" :class="activePolicy === 'oal_skchg' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white font-bold' : 'text-slate-400'" class="py-2 rounded-lg font-semibold">✈️ OAL SC</button>
                    <button @click="activePolicy = 'oal_name'" :class="activePolicy === 'oal_name' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white font-bold' : 'text-slate-400'" class="py-2 rounded-lg font-semibold">⌨️ OAL Name</button>
                </div>

                <div x-show="isAdminMode" class="bg-[#0b1329] border border-slate-800 rounded-xl p-6 space-y-6 shadow-2xl">
                    
                    <div class="border-2 border-dashed border-sky-800/80 bg-sky-950/20 rounded-xl p-6 text-center hover:border-sky-400 transition relative">
                        <input type="file" accept=".pdf" @change="handlePdfAutoUpload($event)" class="absolute inset-0 opacity-0 cursor-pointer z-10" />
                        <div class="space-y-1">
                            <span class="text-3xl block">🤖 Dynamic Universal PDF Document Scanner</span>
                            <p class="text-xs text-slate-200 font-semibold">Drop ANY carrier policy PDF guidelines here to instantly auto-generate field matrix fields</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div><label class="block text-slate-400 mb-1">Airline Name</label><input type="text" x-model="formAirline.airlineName" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-slate-400 mb-1">IATA Code</label><input type="text" x-model="formAirline.iata" :disabled="isEditing" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-amber-400 mb-1">SKD Trigger</label><input type="text" x-model="formAirline.threshold" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                        <div><label class="block text-sky-400 mb-1">Travel Window</label><input type="text" x-model="formAirline.travelWindow" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded text-white" /></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs pt-2">
                        <div><label class="block text-emerald-400 mb-1">OAL Rebooking</label><input type="text" x-model="formAirline.oalRebookingVal" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-emerald-400 mb-1">Refund Eligibility</label><input type="text" x-model="formAirline.refundEligVal" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">Web Portal Link</label><input type="url" x-model="formAirline.policyWebLink" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                        <div><label class="block text-slate-400 mb-1">Guidelines PDF URL</label><input type="url" x-model="formAirline.policyPdfLink" class="w-full bg-[#070b19] border border-slate-800 p-2 rounded" /></div>
                    </div>

                    <div class="bg-[#070b19] p-4 rounded-xl border border-slate-800 space-y-4">
                        <div class="bg-slate-900 p-4 border border-dashed border-slate-700 rounded-lg grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="block font-semibold mb-1">Column Selection</label>
                                    <select x-model="targetColumnType" class="w-full bg-slate-950 border border-slate-700 p-2 rounded">
                                        <option value="skchg">Schedule Change Framework</option>
                                        <option value="refund">Refund Protocols</option>
                                    </select>
                                </div>
                                <div><label class="block font-semibold mb-1">Waiver Classification</label>
                                    <select x-model="targetConditionType" class="w-full bg-slate-950 border border-slate-700 p-2 rounded">
                                        <option value="normal">Normal Policy Profile</option>
                                        <option value="irop">IROPS Emergency Profile</option>
                                    </select>
                                </div>
                            </div>
                            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-2 pt-2">
                                <input type="text" x-model="newCustomLabel" placeholder="Custom Label Box..." class="bg-slate-950 p-2 border border-slate-800 rounded text-white" />
                                <input type="text" x-model="newCustomValue" placeholder="Rule text block contents..." class="bg-slate-950 p-2 border border-slate-800 rounded text-white md:col-span-2" />
                            </div>
                            <button type="button" @click="addCustomField(activePolicy)" class="md:col-span-2 w-full py-2 bg-indigo-600 font-bold uppercase rounded text-xs">Inject Custom Form Row Field</button>
                        </div>

                        <div class="space-y-4 max-h-[300px] overflow-y-auto">
                            <template x-for="subType in ['normalSkchg', 'iropSkchg', 'normalRefund', 'iropRefund']">
                                <div class="p-2 border border-slate-800 rounded bg-slate-950/60 mt-1">
                                    <span class="text-[10px] font-bold text-amber-500 block uppercase mb-1" x-text="subType.replace('Skchg',' Change Matrix Panel').replace('Refund',' Refund Matrix Panel')"></span>
                                    <template x-for="(field, index) in formAirline.pureSkchg?.[subType]" :key="index">
                                        <div class="flex items-center gap-2 mt-1">
                                            <input type="text" x-model="field.label" class="bg-slate-900 border border-slate-700 p-1 rounded font-bold text-white w-1/3" />
                                            <input type="text" x-model="field.value" class="bg-slate-900 border border-slate-700 p-1 rounded text-slate-300 flex-1" />
                                            <button type="button" @click="field.allowed = !field.allowed" :class="field.allowed ? 'bg-emerald-600' : 'bg-rose-600'" class="px-2 py-1 rounded text-[9px]" x-text="field.allowed ? 'YES' : 'NO'"></button>
                                            <button type="button" @click="formAirline.pureSkchg[subType].splice(index, 1)" class="text-rose-500 font-bold px-1 text-xs">🗑️</button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                    <button @click="saveAirline()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold uppercase rounded-lg shadow-lg">Commit & Save Complete Airline Profile Object</button>
                </div>

                <div>
                    <template x-if="selectedAirline">
                        <div class="space-y-6">
                            <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                <h3 class="text-xs font-bold text-slate-300 uppercase tracking-widest">OFFICIAL CARRIER DOCUMENT VAULT</h3>
                                <div class="flex flex-wrap gap-4 text-xs font-semibold">
                                    <template x-if="selectedAirline.policyWebLink">
                                        <a :href="selectedAirline.policyWebLink" target="_blank" class="flex items-center space-x-2 bg-slate-950 border border-slate-700 px-4 py-3 rounded-lg hover:text-sky-400 transition shadow-md"><span>🔗</span> <span>Official Web Portal</span></a>
                                    </template>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 animate-fadeIn">
                                <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] font-bold text-slate-400">SKD CHG TRIGGER</span><span class="text-xs font-bold text-amber-500 mt-1 block" x-text="selectedAirline.threshold || 'N/A'"></span></div>
                                <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] font-bold text-slate-400">TRAVEL WINDOW</span><span class="text-xs font-bold text-sky-400 mt-1 block" x-text="selectedAirline.travelWindow || 'N/A'"></span></div>
                                <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] font-bold text-slate-400">OAL REBOOKING</span><span class="text-xs font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.oalRebookingVal"></span></div>
                                <div class="bg-[#0b1329] p-4 rounded-xl border border-slate-800 text-center"><span class="block text-[10px] font-bold text-slate-400">REFUND ELIGIBILITY</span><span class="text-xs font-bold text-emerald-400 mt-1 block" x-text="selectedAirline.refundEligVal"></span></div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider">SCHEDULE CHANGE FRAMEWORK</h3>
                                    <div class="space-y-4 text-xs">
                                        <span class="text-[10px] font-bold text-indigo-400 tracking-widest uppercase block bg-slate-950 p-1 border-l-2 border-indigo-500">Normal Policy Ruleset</span>
                                        <template x-for="field in selectedAirline.pureSkchg?.normalSkchg">
                                            <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2">
                                                <div class="flex justify-between items-center mb-1"><span class="text-slate-400 font-bold text-[10px]" x-text="field.label"></span><span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10' : 'text-rose-500 bg-rose-500/10'" class="text-[9px] px-1.5 rounded font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span></div>
                                                <p class="text-slate-200 select-text font-medium leading-relaxed" x-text="field.value"></p>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <div class="bg-[#0b1329] p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider">REFUND PROTOCOLS</h3>
                                    <div class="space-y-4 text-xs">
                                        <span class="text-[10px] font-bold text-indigo-400 tracking-widest uppercase block bg-slate-950 p-1 border-l-2 border-indigo-500">Normal Refund Protocols</span>
                                        <template x-for="field in selectedAirline.pureSkchg?.normalRefund">
                                            <div x-show="viewMode === 'agent' || !isInternalField(field.label)" class="flex flex-col border-b border-slate-800/40 pb-2">
                                                <div class="flex justify-between items-center mb-1"><span class="text-emerald-400 font-bold text-[10px]" x-text="field.label"></span><span :class="field.allowed ? 'text-emerald-500 bg-emerald-500/10' : 'text-rose-500 bg-rose-500/10'" class="text-[9px] px-1.5 rounded font-bold" x-text="field.allowed ? 'ALLOWED' : 'PROHIBITED'"></span></div>
                                                <p class="text-slate-200 select-text font-medium leading-relaxed" x-text="field.value"></p>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                    <template x-if="!selectedAirline">
                        <div class="bg-slate-900 border border-slate-800 p-12 text-center rounded-xl font-medium text-slate-500 uppercase tracking-widest shadow-inner">No Airline Selected</div>
                    </template>
                </div>
            </div>
        </main>
    </div>

</body>
