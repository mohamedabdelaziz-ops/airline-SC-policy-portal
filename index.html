<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disruption Desk - Airline Policy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-sky-500 selection:text-white">

    <div x-data="{
        searchQuery: '',
        selectedAirline: null,
        isAdminMode: false,
        adminPasswordInput: '',
        isEditing: false,
        viewMode: 'agent', 
        currentLang: 'en',
        activePolicy: 'pure_skchg', 
        airlines: [],
        
        // Tracking structures for completely dynamic custom fields
        newFieldName: '',
        newFieldValue: '',

        i18n: {
            en: {
                title: 'DISRUPTION DESK',
                subtitle: 'Airline Policy Reference Hub',
                searchLabel: 'Search Fleet Index',
                searchPlaceholder: 'Carrier, IATA, ICAO...',
                indexLabel: 'Airlines Index',
                paxView: 'PASSENGER VIEW',
                agentView: 'AGENT VIEW',
                tabPureSkchg: '🔄 Pure Airline: Schedule Change',
                tabPureName: '📝 Pure Airline: Name Correction',
                tabOalSkchg: '✈️ OAL Policy: Schedule Change',
                tabOalName: '⌨️ OAL Policy: Name Correction',
                docSectionHeader: '📚 Official Carrier Document Vault',
                webLinkLabel: 'Official Web Policy Portal',
                pdfLinkLabel: 'Download Reference Guidelines (PDF)',
                noLinksText: 'No verified external attachments uploaded for this carrier.',
                noSelection: 'No Carrier Selection Detected'
            }
        },

        formAirline: {
            airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-29',
            policyWebLink: '', policyPdfLink: '',
            
            // Core screenshot metrics metrics pre-mapped
            threshold: '', travelWindow: '', oalRebookingVal: '', refundEligVal: '',
            
            // All policy content areas are now stored in completely dynamic, user-editable arrays
            pure_skchg_fields: [],
            pure_name_fields: [],
            oal_skchg_fields: [],
            oal_name_fields: []
        },

        init() {
            // Seed master data matching your exact screenshots and uploaded guideline histories
            this.airlines = [
                {
                    airlineName: 'Lufthansa Group', iata: 'LH', icao: 'DLH', logo: '🇩🇪', lastUpdated: '2026-06-29',
                    policyWebLink: 'https://www.lufthansagroup.com/en/themes/agency-support.html', policyPdfLink: '',
                    threshold: 'Varies by route', travelWindow: 'Subject to inventory rules', oalRebookingVal: 'PROHIBITED', refundEligVal: 'YES',
                    pure_skchg_fields: [
                        { label: 'Minor Change Profile', value: 'Time deviations below airline-defined threshold limits.' },
                        { label: 'Major Change Profile', value: 'Significant operation adjustments or scheduling cancellations.' },
                        { label: 'Cabin Matching Rules', value: 'Strict Cabin Balance Required.' },
                        { label: 'Booking Class (RBD) Rules', value: 'Rebook original RBD class configuration if active.' },
                        { label: 'Inventory Fallback Target', value: 'Original booking class preferred.' },
                        { label: 'Endorsement Box Waiver Text', value: 'DUE SKCH' },
                        { label: 'Geo Airport Allowance Map', value: 'Bilateral alternate rerouting constraints apply.' },
                        { label: 'Refund Policy if Main Airline Causes Change', value: 'Full complimentary reinstatement into original RBD on new PNR. If closed, rebook next open class inside the original cabin attributes.' },
                        { label: 'Involuntary Admin Penalties', value: 'None' },
                        { label: 'GDS Cash Refund Waiver Code', value: 'System Verified' },
                        { label: 'GDS OSI / Tour Code Box', value: 'OS LH INVOL SKCHG' },
                        { label: 'Support Desks Contact Email', value: 'agency.support@lufthansagroup.com' },
                        { label: 'Support Desks Contact Phone', value: '+49 69 86 799 799' }
                    ],
                    pure_name_fields: [
                        { label: 'Self-Service Typo Tolerance Threshold', value: 'Up to two (2) letters in the first-, middle- or last name or title can be corrected directly by the travel agent in the GDS system (e.g., BRWON to BROWN). [cite: 34, 67]' },
                        { label: 'Nickname / Alternative Variant Mapping', value: 'Correction of common nicknames/variants (e.g., BILL to WILLIAM) must be routed to Lufthansa Group. [cite: 67]' },
                        { label: 'Inverted Given/Surname Sequence Rules', value: 'Correction of names in an inverted sequence (e.g., PETER/WILLIAM to WILLIAM/PETER) must be handled by Lufthansa Group Agency Support. [cite: 67]' },
                        { label: 'Adding Second First/Middle/Last Names', value: 'Adding a first, middle, or last name as per travel document (proof required) is managed by Lufthansa Group Agency Support. Deletion is not permitted. [cite: 34, 73, 83]' },
                        { label: 'Legal / Marriage Changes', value: 'Passenger name changes due to marriage, divorce, gender reassignment, legal proceedings and/or a new passport/ID are allowed with valid proof validation. [cite: 58, 59]' },
                        { label: 'Change Penalties / Fees', value: 'As of 01 July 2024, the Name Correction Fee has been completely abolished. [cite: 34, 51]' },
                        { label: 'Reissue / Swap Command', value: 'Native ticket reissue as even exchange. No support waiver needed. [cite: 136, 138]' },
                        { label: 'OSI Formatting String', value: 'Endorsement Box text must be documented with: NAME CORRECTION. [cite: 137]' },
                        { label: 'Technical Infrastructure Restrictions', value: 'If an FQTV element is included, delete it and re-enter after correction. [cite: 93, 94]' },
                        { label: 'Non-Feasible Secondary Workarounds', value: 'If name correction in the ticket is not feasible, enter correct name as SSR DOCS element. [cite: 110, 122, 123]' }
                    ],
                    oal_skchg_fields: [
                        { label: 'OAL Disrupt Protection Matrix Guidelines', value: 'Lufthansa Group support cannot assist with flight confirmations on other airlines. Fare differences apply if confirmed in higher RBD. [cite: 102, 107]' },
                        { label: 'Policy if Codeshare/OAL Partner Causes Change', value: 'Authorized if the partner airline changes cause a structural misconnect or delay over 3 hours. Ticket stock 257/082/220/724 must be verified.' }
                    ],
                    oal_name_fields: [
                        { label: 'Name Correction Rules with Codeshare/OAL Flights', value: 'To prevent automated cancellation (UC/HX status codes) by other airlines (OAL), a fresh PNR must be created whenever a name correction is processed in a PNR containing external codeshare or interline segments. [cite: 85]' }
                    ]
                },
                {
                    airlineName: 'Air Canada', iata: 'AC', icao: 'ACA', logo: '✈️', lastUpdated: '2026-06-27',
                    policyWebLink: 'https://www.aircanada.com/agency', policyPdfLink: '',
                    threshold: '3 hours / Flight Cancel', travelWindow: '+/-30 Days (All)', oalRebookingVal: 'ALLOWED', refundEligVal: 'YES',
                    pure_skchg_fields: [
                        { label: 'Minor Change Profile', value: 'Less than 60 minutes time deviation.' },
                        { label: 'Major Change Profile', value: '60 minutes or more / Operating carrier change / Stop added.' }
                    ],
                    pure_name_fields: [],
                    oal_skchg_fields: [
                        { label: 'Minor Change Profile', value: 'Flight time change less than 3 hours. Rebook within +/-3 days North America, +/-7 days other destinations. [cite: 156, 157]' },
                        { label: 'Major Change Profile', value: 'Flight time change of 3 hours or more, or flight cancellation. Action segment status changes within 14 days or 48 hours prior to departure. [cite: 151, 152]' },
                        { label: 'Cabin Matching Rules', value: 'Cabin to cabin rebooking required. Premium Rouge/Premium Economy protection on airlines without PE must be rebooked in economy. [cite: 206, 208]' },
                        { label: 'Booking Class (RBD) Rules', value: 'Pure Star Alliance: book lowest available booking code in the same cabin. For other airlines, rebook same class up to Y. [cite: 173, 186]' },
                        { label: 'Inventory Fallback Target', value: 'Economy up to M class, Premium Economy up to O class, Business/Signature up to J class if original flight is subsequently reinstated. [cite: 161, 162]' },
                        { label: 'Endorsement Box Waiver Text', value: 'SKCHxxxx (flight number) (e.g., SKCH1234) [cite: 215]' },
                        { label: 'Geo Airport Allowance Map', value: 'Alternate AC stations allowed within 200 miles radius (e.g., MIA and FLL). Same origin/destination and global direction must be respected. [cite: 213, 218, 221]' },
                        { label: 'Rebooking Order Priority', value: '1. AC/Express/Rouge -> 2. Atlantic Joint Venture (AC, UA, LHG for Transatlantic only) -> 3. AC codeshare via Star Alliance -> 4. Pure Star Alliance -> 5. AC codeshare via other airlines -> 6. Other airlines (North America/Caribbean/Mexico/Central America) -> 7. Other airlines for Australia/NZ (UA not permitted) -> 8. Pure Star Alliance/OAL for Transatlantic/Transpacific/South America. [cite: 170, 171, 172, 174, 187, 188, 189, 191]' },
                        { label: 'Alliance Rebooking Allowance', value: 'Pure Star Alliance allowed using the lowest available booking code in the same cabin. For Transatlantic over-the-water protections, use AC marketed/operated or Atlantic Joint Venture carriers (AC, UA, LHG) only. [cite: 173, 180]' },
                        { label: 'Codeshare / Interline Mapping', value: 'Action status codes UN, NO, HX, WK, WL, WN, TK, UC, US, or DS. Change fee waived but additional collection applies for Economy higher than M class. [cite: 152, 154]' },
                        { label: 'GDS Cash Refund Waiver Code', value: 'Waiver Box: SKCH00 (flight number). Accessibility: ACCESSxxxx. Cabin changes/regrades to/from US: REGRADExxxx. [cite: 240, 244, 246]' },
                        { label: 'GDS OSI / Tour Code Box', value: 'OSI AC INVOL SKCHG / Add schedule change remarks on the PNR accordingly. [cite: 239]' },
                        { label: 'Policy if Codeshare/OAL Partner Causes Change', value: 'If original flight is subsequently reinstated, you may rebook clients on original flight without penalty. If original class unavailable, rebook Economy up to M, Premium Economy up to O, Business/Signature up to J. [cite: 160, 161, 162]' },
                        { label: 'Refund Policy if Codeshare/OAL Partner Causes Change', value: 'Permitted through normal GDS processing for refundable tickets. Permitted for non-refundable tickets if delay is 3+ hours or cancelled. [cite: 183, 223]' }
                    ],
                    oal_name_fields: []
                }
            ];
            this.selectedAirline = this.airlines[0]; 
        },
        get filteredAirlines() {
            if (!this.searchQuery) return this.airlines;
            return this.airlines.filter(airline => {
                return airline.airlineName.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.iata.toLowerCase().includes(this.searchQuery.toLowerCase()) ||
                       airline.icao.toLowerCase().includes(this.searchQuery.toLowerCase());
            });
        },
        // Admin Dynamic Schema Methods
        addField() {
            if (!this.newFieldName) return alert('Please input field name.');
            const targetArray = `${this.activePolicy}_fields`;
            this.formAirline[targetArray].push({ label: this.newFieldName, value: this.newFieldValue });
            this.newFieldName = ''; this.newFieldValue = '';
        },
        deleteField(index) {
            const targetArray = `${this.activePolicy}_fields`;
            this.formAirline[targetArray].splice(index, 1);
        },
        saveAirline() {
            if(!this.formAirline.airlineName || !this.formAirline.iata) return alert('Airline Name and IATA are required.');
            this.formAirline.iata = this.formAirline.iata.toUpperCase();
            
            if(this.isEditing) {
                const idx = this.airlines.findIndex(a => a.iata === this.formAirline.iata);
                if(idx !== -1) this.airlines[idx] = JSON.parse(JSON.stringify(this.formAirline));
            } else {
                this.airlines.push(JSON.parse(JSON.stringify(this.formAirline)));
            }
            this.selectedAirline = this.airlines[this.airlines.length - 1];
            this.resetForm();
        },
        editAirline(airline) {
            this.formAirline = JSON.parse(JSON.stringify(airline));
            this.isEditing = true;
            this.isAdminMode = true;
        },
        resetForm() {
            this.formAirline = {
                airlineName: '', iata: '', icao: '', logo: '✈️', lastUpdated: '2026-06-29', policyWebLink: '', policyPdfLink: '',
                threshold: '', travelWindow: '', oalRebookingVal: 'PROHIBITED', refundEligVal: 'YES',
                pure_skchg_fields: [], pure_name_fields: [], oal_skchg_fields: [], oal_name_fields: []
            };
            this.isEditing = false;
        }
    }" class="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased">

        <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🌐</span>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent" x-text="i18n[currentLang].title"></h1>
                    <p class="text-xs text-slate-400 font-medium" x-text="i18n[currentLang].subtitle"></p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="flex items-center bg-slate-900 p-1 border border-slate-800 rounded-lg">
                    <input type="password" placeholder="Admin Key..." x-model="adminPasswordInput" @keyup.enter="verifyAdmin()" class="bg-slate-950 border-0 outline-none text-xs px-2 py-1 rounded text-white w-20 focus:ring-1 focus:ring-sky-500" />
                    <button @click="verifyAdmin()" class="bg-slate-800 hover:bg-sky-600 text-white font-bold text-[10px] px-2 py-1 rounded ml-1 transition">Auth</button>
                </div>
                <template x-if="isAdminMode">
                    <button @click="isAdminMode = false; resetForm()" class="text-[10px] font-bold border border-slate-700 bg-slate-800 hover:bg-rose-600 text-white px-2.5 py-1 rounded transition uppercase">Lock</button>
                </template>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 flex-1 w-full">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl shadow-xl space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2" x-text="i18n[currentLang].searchLabel"></label>
                        <input type="text" :placeholder="i18n[currentLang].searchPlaceholder" x-model="searchQuery" class="w-full px-4 py-2 bg-slate-950 border border-slate-700 rounded-lg text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-xl">
                    <span class="text-xs font-semibold text-slate-400 block mb-3 uppercase tracking-wider"><span x-text="i18n[currentLang].indexLabel"></span> (<span x-text="filteredAirlines.length"></span>)</span>
                    <div class="space-y-1.5 max-h-[300px] overflow-y-auto pr-1">
                        <template x-for="airline in filteredAirlines" :key="airline.iata">
                            <div class="flex items-center space-x-1">
                                <button @click="selectedAirline = airline" :class="selectedAirline && selectedAirline.iata === airline.iata ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow-lg' : 'bg-slate-950 hover:bg-slate-800 text-slate-300 border border-slate-800/60'" class="flex-1 text-left p-3 rounded-lg flex justify-between items-center transition">
                                    <div class="flex items-center space-x-3"><span class="text-lg" x-text="airline.logo"></span><span class="font-semibold text-sm" x-text="airline.airlineName"></span></div>
                                    <span class="font-mono text-xs opacity-70" x-text="'[' + airline.iata + ']'"></span>
                                </button>
                                <template x-if="isAdminMode">
                                    <button @click="editAirline(airline)" class="p-2 bg-slate-900 hover:bg-amber-600 border border-slate-800 rounded text-xs text-amber-400 hover:text-white transition">✏️</button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-xl grid grid-cols-2 md:grid-cols-4 gap-1.5">
                    <button @click="activePolicy = 'pure_skchg'" :class="activePolicy === 'pure_skchg' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabPureSkchg"></button>
                    <button @click="activePolicy = 'pure_name'" :class="activePolicy === 'pure_name' ? 'bg-gradient-to-r from-sky-600 to-indigo-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabPureName"></button>
                    <button @click="activePolicy = 'oal_skchg'" :class="activePolicy === 'oal_skchg' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabOalSkchg"></button>
                    <button @click="activePolicy = 'oal_name'" :class="activePolicy === 'oal_name' ? 'bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow font-bold' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg text-xs font-semibold transition" x-text="i18n[currentLang].tabOalName"></button>
                </div>

                <div x-show="isAdminMode" class="bg-slate-900 border-2 border-amber-500/20 rounded-xl p-6 shadow-2xl space-y-6">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                        <h3 class="font-bold text-sm text-amber-400 uppercase tracking-wider">Dynamic Schema Ruleset Studio</h3>
                        <button @click="resetForm()" class="text-xs bg-slate-800 text-slate-300 px-3 py-1 rounded">Clear Form</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-xs">
                        <div><label class="block font-semibold text-slate-400 mb-1">Airline Name</label><input type="text" x-model="formAirline.airlineName" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">IATA Code</label><input type="text" x-model="formAirline.iata" :disabled="isEditing" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">Threshold Dashboard Card Value</label><input type="text" x-model="formAirline.threshold" placeholder="e.g., 60 mins" class="w-full bg-slate-950 border border-slate-700 p-2 rounded" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">Window Dashboard Card Value</label><input type="text" x-model="formAirline.travelWindow" placeholder="e.g., +/- 3 Days" class="w-full bg-slate-950 border border-slate-700 p-2 rounded" /></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs border-t border-slate-800 pt-4">
                        <div><label class="block font-semibold text-slate-400 mb-1">Official Web Portal URL</label><input type="url" x-model="formAirline.policyWebLink" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                        <div><label class="block font-semibold text-slate-400 mb-1">Downloadable Reference PDF URL</label><input type="url" x-model="formAirline.policyPdfLink" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-white" /></div>
                    </div>

                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-4">
                        <span class="text-xs font-bold font-mono text-indigo-400 uppercase block">Modifying Fields For: <span class="text-white" x-text="activePolicy.toUpperCase().replace('_', ' ')"></span></span>
                        
                        <div class="bg-slate-900 p-4 rounded-lg border border-dashed border-slate-700 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                            <div><label class="block text-xs font-semibold text-slate-400 mb-1">Custom Field Name (Rename/Create)</label><input type="text" x-model="newFieldName" placeholder="e.g., Cabin Matching Profile" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-xs text-white" /></div>
                            <div><label class="block text-xs font-semibold text-slate-400 mb-1">Field Policy Value Description</label><input type="text" x-model="newFieldValue" placeholder="e.g., Free exchange inside same cabin" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-xs text-white" /></div>
                            <button @click="addField()" class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 font-bold text-xs uppercase rounded transition">➕ Add/Inject Field Slot</button>
                        </div>

                        <div class="space-y-2 max-h-[300px] overflow-y-auto pr-1">
                            <template x-for="(field, index) in formAirline[`${activePolicy}_fields`]" :key="index">
                                <div class="bg-slate-900 border border-slate-800 p-2 rounded-lg flex items-center justify-between gap-4 text-xs">
                                    <div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-2">
                                        <input type="text" x-model="field.label" class="bg-slate-950 border border-slate-700 p-1.5 rounded font-bold text-sky-400" />
                                        <textarea x-model="field.value" class="bg-slate-950 border border-slate-700 p-1.5 rounded md:col-span-2 text-slate-200" rows="1"></textarea>
                                    </div>
                                    <button @click="deleteField(index)" class="text-rose-500 hover:text-rose-400 font-bold px-2 py-1 bg-rose-500/10 rounded transition">🗑️ Delete</button>
                                </div>
                            </template>
                        </div>
                    </div>
                    
                    <button @click="saveAirline()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-bold uppercase text-xs tracking-wider rounded-lg shadow-lg hover:from-amber-400 hover:to-orange-500 transition">Save Complete Fleet Profile Object</button>
                </div>

                <div>
                    <template x-if="selectedAirline">
                        <div class="space-y-6">
                            
                            <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                <div class="flex items-center space-x-2 border-b border-slate-800 pb-2">
                                    <h3 class="text-xs font-bold text-slate-300 uppercase tracking-widest" x-text="i18n[currentLang].docSectionHeader"></h3>
                                </div>
                                <div class="flex flex-wrap gap-4 text-xs font-semibold">
                                    <template x-if="selectedAirline.policyWebLink">
                                        <a :href="selectedAirline.policyWebLink" target="_blank" class="flex items-center space-x-2 bg-slate-950 hover:bg-sky-950 border border-slate-700/60 hover:border-sky-500 text-slate-300 hover:text-sky-400 px-4 py-3 rounded-lg transition shadow-md">
                                            <span>🔗</span> <span x-text="i18n[currentLang].webLinkLabel"></span>
                                        </a>
                                    </template>
                                    <template x-if="selectedAirline.policyPdfLink">
                                        <a :href="selectedAirline.policyPdfLink" target="_blank" download class="flex items-center space-x-2 bg-slate-950 hover:bg-emerald-950 border border-slate-700/60 hover:border-emerald-500 text-slate-300 hover:text-emerald-400 px-4 py-3 rounded-lg transition shadow-md">
                                            <span>📥</span> <span x-text="i18n[currentLang].pdfLinkLabel"></span>
                                        </a>
                                    </template>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center shadow-md"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].skdTrigger"></span><span class="text-sm font-bold text-amber-500 mt-1 block" x-text="selectedAirline.threshold || 'N/A'"></span></div>
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center shadow-md"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].travelWindow"></span><span class="text-sm font-bold text-sky-400 mt-1 block" x-text="selectedAirline.travelWindow || 'N/A'"></span></div>
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center shadow-md"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].oalRebooking"></span><span class="text-sm font-bold text-emerald-500 mt-1 block" x-text="selectedAirline[`${activePolicy.split('_')[0]}_skchg`]?.oalRebookingVal || 'ALLOWED'"></span></div>
                                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 text-center shadow-md"><span class="block text-[10px] uppercase font-bold text-slate-400 tracking-wider" x-text="i18n[currentLang].refundEligibility"></span><span class="text-sm font-bold text-emerald-500 mt-1 block" x-text="selectedAirline[`${activePolicy.split('_')[0]}_skchg`]?.refundEligVal || 'YES'"></span></div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                
                                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">📋</span><h3 class="text-sm font-bold text-sky-400 uppercase tracking-wider" x-text="activePolicy.includes('skchg') ? 'DISRUPTION DESK PRIMARY TARGETS' : 'NAMING COMPLIANCE STANDARDS'"></h3></div>
                                    <div class="space-y-4 text-xs">
                                        <template x-for="(field, index) in selectedAirline[`${activePolicy}_fields`]?.filter((_, i) => i % 2 === 0)" :key="index">
                                            <div class="flex flex-col border-b border-slate-800/40 pb-2.5">
                                                <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px] mb-1" x-text="field.label"></span>
                                                <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl space-y-4">
                                    <div class="flex items-center space-x-2 border-b border-slate-800 pb-3"><span class="text-lg">⚙️</span><h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider" x-text="activePolicy.includes('skchg') ? 'SECONDARY WAIVER AUTHORIZATIONS' : 'WORKSTATION SYSTEM ACTIONS'"></h3></div>
                                    <div class="space-y-4 text-xs">
                                        <template x-for="(field, index) in selectedAirline[`${activePolicy}_fields`]?.filter((_, i) => i % 2 !== 0)" :key="index">
                                            <div class="flex flex-col border-b border-slate-800/40 pb-2.5">
                                                <span class="text-slate-400 font-bold uppercase tracking-wider text-[10px] mb-1" x-text="field.label"></span>
                                                <p class="text-slate-200 font-medium leading-relaxed" x-text="field.value"></p>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                            </div>
                            
                        </div>
                    </template>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
